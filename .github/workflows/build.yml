name: Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request: {}
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install ninja (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install ninja (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ninja

      # Windows uses vcpkg in manifest mode — the configure step picks
      # vcpkg.json up via the toolchain file and pulls pthreads
      # automatically. cJSON is vendored in external/cjson/ so it does
      # not need a system install on any platform.

      - name: Configure (POSIX)
        if: matrix.os != 'windows-latest'
        # Force the vendored cJSON path so we exercise the same code
        # consumers without a system cJSON will hit (e.g. macOS CI of
        # downstream projects).
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DDISPLAYXR_MCP_USE_VENDORED_CJSON=ON -DDISPLAYXR_MCP_BUILD_TESTS=ON

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows -DDISPLAYXR_MCP_USE_VENDORED_CJSON=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test (POSIX)
        if: matrix.os != 'windows-latest'
        run: ctest --test-dir build --output-on-failure
