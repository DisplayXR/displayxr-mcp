name: Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request: {}
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install cJSON (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libcjson-dev ninja-build

      - name: Install cJSON + ninja (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install cjson ninja

      # Windows uses vcpkg in manifest mode — the configure step picks
      # vcpkg.json up via the toolchain file and installs cJSON
      # automatically. No separate install step needed.

      - name: Configure (POSIX)
        if: matrix.os != 'windows-latest'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release --parallel
